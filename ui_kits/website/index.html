<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eco Pacific Painting — Homepage UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<rect width="200" height="200" fill="#0F3863"/>
<circle cx="100" cy="90" r="38" fill="#1789FF"/>
<text x="100" y="150" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#fff">EP</text>
</svg>
</template>
<div id="root"></div>

<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="StatsSection.jsx"></script>
<script type="text/babel" src="ServicesSection.jsx"></script>
<script type="text/babel" src="ProjectsSection.jsx"></script>
<script type="text/babel" src="ReviewsSection.jsx"></script>
<script type="text/babel" src="QuoteSection.jsx"></script>
<script type="text/babel" src="ContactSection.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const { Navbar, Footer, LoadingScreen } = window.EcoPacificPaintingDesignSystem_026966;
  const [loading, setLoading] = useState(true);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setLoading(false), 1400);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    const root = document.getElementById("scroll-root");
    if (!root) return;
    const onScroll = () => setScrolled(root.scrollTop > 24);
    root.addEventListener("scroll", onScroll, { passive: true });
    return () => root.removeEventListener("scroll", onScroll);
  }, []);

  const LINKS = [
    { label: "Home", href: "#home" },
    { label: "Services", href: "#services" },
    { label: "Projects", href: "#projects" },
    { label: "Reviews", href: "#reviews" },
    { label: "Quote", href: "#quote" },
    { label: "Contact", href: "#contact" },
  ];

  return (
    <div id="scroll-root" style={{ height: "100vh", overflowY: "auto", position: "relative" }}>
      <LoadingScreen visible={loading} />
      <div style={{ position: "sticky", top: 0, zIndex: 50 }}>
        <Navbar links={LINKS} scrolled={scrolled} />
      </div>
      <main id="home">
        <Hero />
        <StatsSection />
        <ServicesSection />
        <ProjectsSection />
        <ReviewsSection />
        <QuoteSection />
        <ContactSection />
      </main>
      <Footer
        links={LINKS}
        services={["Residential Painting", "Commercial Painting", "Interior Painting", "Exterior Painting", "Cabinet Painting", "Deck & Fence Staining"]}
        phone="+1 (604) 716-9395"
        email="ecopacificpainting04@gmail.com"
        address="10670 132A Street, British Columbia"
        hours="Monday – Saturday, 7:00 AM – 7:00 PM"
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
