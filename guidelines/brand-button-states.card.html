<!-- @dsCard group="Brand" viewport="700x220" name="Buttons — Hover & Press" subtitle="Filled darkens + lifts; outline tints; no scale/shrink anywhere" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:20px;font-family:var(--font-sans);background:#fff;display:flex;gap:16px;flex-wrap:wrap;}
.btn{border-radius:9999px;padding:12px 22px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all 400ms var(--ease-premium);}
.primary{background:var(--primary-500);color:#fff;box-shadow:var(--shadow-glow);}
.primary:hover{background:var(--primary-600);box-shadow:var(--shadow-lift);transform:translateY(-2px);}
.outline{background:transparent;color:var(--navy-800);border:1px solid var(--navy-200);}
.outline:hover{background:var(--navy-50);transform:translateY(-2px);}
</style>
</head>
<body>
<button class="btn primary">Hover me — primary</button>
<button class="btn outline">Hover me — outline</button>
</body>
</html>
