<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;font-family:var(--font-sans);background:#fff;}
.row{display:flex;gap:14px;align-items:flex-end;}
.box{background:var(--primary-50);border:1px solid var(--primary-200);width:90px;height:70px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px;color:var(--navy-700);font-weight:600;}
</style>
</head>
<body>
<div class="row">
  <div class="box" style="border-radius:var(--radius-md)">md · 8px</div>
  <div class="box" style="border-radius:var(--radius-lg)">lg · 12px</div>
  <div class="box" style="border-radius:var(--radius-xl)">xl · 16px</div>
  <div class="box" style="border-radius:var(--radius-2xl)">2xl · 24px</div>
  <div class="box" style="border-radius:var(--radius-3xl)">3xl · 32px</div>
  <div class="box" style="border-radius:var(--radius-full);width:110px;">full · pill</div>
</div>
</body>
</html>
