<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing Scale" subtitle="Base rem scale used across padding/gaps" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;font-family:var(--font-sans);background:#fff;display:flex;flex-direction:column;gap:6px;}
.row{display:flex;align-items:center;gap:10px;}
.bar{background:var(--primary-500);height:14px;border-radius:4px;}
.label{font-size:11px;color:var(--navy-500);width:150px;}
</style>
</head>
<body>
<div class="row"><div class="label">--space-2 (0.5rem)</div><div class="bar" style="width:8px"></div></div>
<div class="row"><div class="label">--space-4 (1rem)</div><div class="bar" style="width:16px"></div></div>
<div class="row"><div class="label">--space-6 (1.5rem)</div><div class="bar" style="width:24px"></div></div>
<div class="row"><div class="label">--space-8 (2rem)</div><div class="bar" style="width:32px"></div></div>
<div class="row"><div class="label">--space-12 (3rem)</div><div class="bar" style="width:48px"></div></div>
<div class="row"><div class="label">--space-16 (4rem)</div><div class="bar" style="width:64px"></div></div>
<div class="row"><div class="label">--space-20 (5rem, section-y)</div><div class="bar" style="width:80px"></div></div>
</body>
</html>
