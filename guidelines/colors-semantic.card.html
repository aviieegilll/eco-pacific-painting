<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;font-family:'Plus Jakarta Sans',sans-serif;background:#fff;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{height:80px;border-radius:10px;display:flex;align-items:flex-end;padding:6px 10px;font-size:10.5px;font-weight:600;border:1px solid var(--border-default);}
</style>
</head>
<body>
<div class="grid">
  <div class="sw" style="background:var(--accent);color:#fff">--accent</div>
  <div class="sw" style="background:var(--accent-hover);color:#fff">--accent-hover</div>
  <div class="sw" style="background:var(--accent-wash);color:var(--navy-700)">--accent-wash</div>
  <div class="sw" style="background:var(--surface-inverse);color:#fff">--surface-inverse</div>
  <div class="sw" style="background:var(--text-heading);color:#fff">--text-heading</div>
  <div class="sw" style="background:var(--text-body);color:#fff">--text-body</div>
  <div class="sw" style="background:var(--danger);color:#fff">--danger</div>
  <div class="sw" style="background:var(--danger-wash);color:var(--danger)">--danger-wash</div>
</div>
</body>
</html>
